<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STONKS AI | Studio Terminal</title>

    <script>
        const authToken = localStorage.getItem('stonks_auth_token');
        if (!authToken) window.location.replace('index.html');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bgDark: '#0b0c10', panelDark: '#12141a', textMain: '#f3f4f6', textMuted: '#9ca3af' },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0c10; }
        ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a5568; }
    </style>
</head>
<body class="antialiased min-h-screen bg-bgDark text-textMain overflow-x-hidden flex flex-col relative selection:bg-purple-500/30">

    <canvas id="stonks-canvas" class="fixed inset-0 w-full h-full z-0 pointer-events-none"></canvas>

    <div class="fixed top-0 left-0 w-full z-50 flex justify-center pt-6 px-4 pointer-events-none">
        <nav id="dynamic-nav" class="pointer-events-auto w-full max-w-7xl border border-white/5 bg-[#0b0c10]/30 backdrop-blur-xl rounded-2xl shadow-lg transition-all duration-500 ease-in-out">
            <div id="nav-content" class="px-6 h-20 flex items-center justify-between transition-all duration-500 ease-in-out">
                
                <div class="flex items-center gap-3 cursor-pointer" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
                    <div class="h-10 w-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-[0_0_15px_rgba(139,92,246,0.3)]">
                        <i class="fas fa-brain text-white text-xl"></i>
                    </div>
                    <h1 class="text-2xl font-bold tracking-tight hidden sm:block">
                        <span class="gradient-text">STONKS AI</span> Studio
                    </h1>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="relative group hidden sm:block">
                        <div class="absolute -inset-0.5 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full blur opacity-20 group-hover:opacity-40 transition duration-500"></div>
                        <div class="relative flex items-center">
                            <i class="fas fa-search absolute left-4 text-gray-400"></i>
                            <input type="text" id="tickerInput" class="w-48 lg:w-72 pl-12 pr-4 py-2.5 bg-[#0b0c10]/60 border border-white/10 rounded-full text-white focus:outline-none focus:border-blue-500 uppercase tracking-wider transition-colors placeholder-gray-500 backdrop-blur-md shadow-inner" placeholder="TICKER (e.g. TCS.NS)">
                        </div>
                    </div>
                    
                    <button onclick="analyzeStock()" class="px-6 py-2.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-500 transition-colors rounded-full flex items-center gap-2 shadow-[0_0_15px_rgba(37,99,235,0.4)] border border-blue-400/30">
                        Initialize <i class="fas fa-bolt text-xs"></i>
                    </button>
                    
                    <button onclick="logout()" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-white bg-white/5 border border-white/10 rounded-full hover:bg-red-500/20 hover:border-red-500/50 transition-all" title="Secure Logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </nav>
    </div>

    <main class="relative z-10 flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-36 pb-20 w-full">
        
        <div id="loadingState" class="hidden flex-col items-center justify-center py-32">
            <div class="relative w-24 h-24 mb-6">
                <div class="absolute inset-0 rounded-full border-4 border-white/5 shadow-[0_0_30px_rgba(139,92,246,0.2)]"></div>
                <div class="absolute inset-0 rounded-full border-4 border-transparent loader border-t-purple-500 border-r-blue-500"></div>
                <i class="fas fa-microchip absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-3xl gradient-text"></i>
            </div>
            <p class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400 font-bold tracking-widest uppercase text-sm animate-pulse">Running Neural Networks...</p>
        </div>

        <div id="dashboardContent" class="hidden space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                
                <div class="glass-panel rounded-3xl p-8 col-span-1 md:col-span-2 flex flex-col justify-between relative overflow-hidden bg-[#0b0c10]/40 backdrop-blur-xl border border-white/5">
                    <div class="absolute top-0 right-0 -mt-10 -mr-10 w-48 h-48 bg-blue-600 rounded-full mix-blend-multiply filter blur-[64px] opacity-20"></div>
                    <div class="relative z-10">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="px-3 py-1 rounded-full bg-blue-500/10 text-blue-400 text-[10px] font-bold uppercase tracking-widest border border-blue-500/20 backdrop-blur-md">NSE Equity</span>
                        </div>
                        <h2 id="displayTicker" class="text-5xl font-black tracking-tight mt-2 text-white drop-shadow-lg">---</h2>
                    </div>
                    
                    <div class="flex flex-wrap items-end gap-10 mt-10 relative z-10">
                        <div>
                            <p class="text-[11px] text-gray-500 uppercase tracking-widest mb-2 font-bold">Spot Price</p>
                            <p class="text-4xl font-light tracking-tight text-white" id="currentPrice">---</p>
                        </div>
                        <div class="pl-6 border-l border-white/10">
                            <p class="text-[11px] text-purple-400 uppercase tracking-widest mb-2 font-bold">LSTM Target (T+1)</p>
                            <p class="text-4xl font-bold flex items-center gap-2 text-white" id="predictedPrice">---</p>
                        </div>
                    </div>
                </div>

                <div class="glass-panel rounded-3xl p-6 flex flex-col items-center justify-start text-center relative overflow-hidden bg-[#0b0c10]/40 backdrop-blur-xl border border-white/5">
                    <div class="absolute bottom-0 left-0 -mb-10 -ml-10 w-40 h-40 bg-purple-600 rounded-full mix-blend-multiply filter blur-[64px] opacity-20"></div>
                    
                    <div class="w-full flex justify-between items-center mb-4 border-b border-white/5 pb-2">
                        <h3 class="text-textMuted text-xs font-bold uppercase tracking-widest">Signal Matrix</h3>
                        <i class="fas fa-radar text-gray-500"></i>
                    </div>
                    
                    <button id="revealSignalBtn" onclick="toggleSignal()" class="relative w-full py-4 mt-2 text-sm font-bold text-white transition-all duration-300 bg-gradient-to-r from-purple-600/80 to-blue-600/80 rounded-xl flex items-center justify-center gap-3 border border-white/10 opacity-50" disabled>
                        <i class="fas fa-lock" id="btnIcon"></i> <span id="btnText">Awaiting Data...</span>
                    </button>

                    <div id="signalResultData" class="hidden flex-col items-center w-full mt-4 transition-all duration-500 ease-in-out">
                        <div id="alertBadgeContainer" class="p-[1px] rounded-full bg-gradient-to-r from-gray-700 to-gray-600 mb-4 shadow-lg w-full max-w-[200px]">
                            <span id="alertBadge" class="block px-6 py-1.5 rounded-full text-sm font-bold bg-[#12141a] text-gray-300 tracking-wider">---</span>
                        </div>
                        
                        <p class="text-[10px] text-textMuted uppercase tracking-wider mb-1">Confidence Score</p>
                        <p id="radarScore" class="text-4xl font-bold gradient-text mb-3 drop-shadow-md">--</p>
                        <p id="radarDetails" class="text-xs text-gray-300 mt-2 px-4 bg-[#0b0c10]/60 py-3 rounded-xl border border-white/5 shadow-inner w-full text-left leading-relaxed"></p>
                    </div>
                </div>

                <div class="glass-panel rounded-3xl p-6 flex flex-col justify-between bg-[#0b0c10]/40 backdrop-blur-xl border border-white/5 relative overflow-hidden">
                    <div class="absolute top-0 right-0 -mt-10 -mr-10 w-32 h-32 bg-emerald-600 rounded-full mix-blend-multiply filter blur-[50px] opacity-10"></div>
                    
                    <div class="w-full flex justify-between items-center mb-6">
                        <h3 class="text-textMuted text-xs font-bold uppercase tracking-widest">FinBERT NLP</h3>
                        <i class="fas fa-newspaper text-gray-500"></i>
                    </div>

                    <div class="flex flex-col items-center justify-center h-full relative z-10">
                        <div class="h-16 w-16 rounded-full bg-[#0b0c10]/80 border border-white/10 flex items-center justify-center mb-4 shadow-[0_0_20px_rgba(255,255,255,0.05)]">
                            <i id="sentimentIcon" class="fas fa-minus text-2xl text-gray-500"></i>
                        </div>
                        <p id="sentimentLabel" class="text-xl font-bold tracking-wide text-white mb-6">---</p>
                        
                        <div class="w-full relative px-2">
                            <div class="w-full bg-[#12141a] rounded-full h-2 overflow-hidden border border-white/5 shadow-inner">
                                <div id="sentimentBar" class="bg-gray-500 h-2 rounded-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                            </div>
                            <div class="flex justify-between text-[10px] text-gray-500 mt-3 uppercase font-bold tracking-widest">
                                <span>Bearish</span>
                                <span>Bullish</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <div class="glass-panel rounded-3xl p-6 lg:col-span-2 bg-[#0b0c10]/40 backdrop-blur-xl border border-white/5">
                    <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-3">
                        <h3 class="text-textMuted text-xs font-bold uppercase tracking-widest">AI Projection Vector</h3>
                        <div class="flex gap-2">
                            <span class="w-3 h-3 rounded-full bg-red-500/20 border border-red-500/50"></span>
                            <span class="w-3 h-3 rounded-full bg-yellow-500/20 border border-yellow-500/50"></span>
                            <span class="w-3 h-3 rounded-full bg-green-500/20 border border-green-500/50"></span>
                        </div>
                    </div>
                    <div class="relative h-[350px] w-full">
                        <canvas id="stockChart"></canvas>
                    </div>
                </div>

                <div class="glass-panel rounded-3xl p-6 flex flex-col bg-[#0b0c10]/40 backdrop-blur-xl border border-white/5">
                    <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-3">
                        <h3 class="text-textMuted text-xs font-bold uppercase tracking-widest">Topology Detection</h3>
                        <i class="fas fa-draw-polygon text-gray-500"></i>
                    </div>
                    
                    <div class="mb-6 space-y-3">
                        <div class="flex justify-between items-center bg-[#0b0c10]/60 border border-white/5 px-4 py-3.5 rounded-xl backdrop-blur-md shadow-sm">
                            <div class="flex items-center gap-3">
                                <div class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
                                <span class="text-xs text-gray-300 font-bold uppercase tracking-wider">Resistance</span>
                            </div>
                            <span id="resLevel" class="font-mono text-white font-bold">---</span>
                        </div>
                        <div class="flex justify-between items-center bg-[#0b0c10]/60 border border-white/5 px-4 py-3.5 rounded-xl backdrop-blur-md shadow-sm">
                            <div class="flex items-center gap-3">
                                <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)]"></div>
                                <span class="text-xs text-gray-300 font-bold uppercase tracking-wider">Support</span>
                            </div>
                            <span id="supLevel" class="font-mono text-white font-bold">---</span>
                        </div>
                    </div>
                    
                    <div class="flex-grow overflow-hidden flex flex-col">
                        <h4 class="text-[10px] text-gray-500 uppercase tracking-widest mb-3 font-bold px-1">Identified Structures</h4>
                        <ul id="patternList" class="space-y-3 overflow-y-auto pr-2 pb-2 flex-grow max-h-[180px]">
                        </ul>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const dynamicNav = document.getElementById('dynamic-nav');
        const navContent = document.getElementById('nav-content');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 30) {
                dynamicNav.classList.remove('max-w-7xl', 'rounded-2xl', 'bg-[#0b0c10]/30', 'border-white/5');
                dynamicNav.classList.add('max-w-5xl', 'rounded-full', 'bg-white/10', 'border-white/20');
                navContent.classList.remove('h-20');
                navContent.classList.add('h-16', 'px-8');
            } else {
                dynamicNav.classList.add('max-w-7xl', 'rounded-2xl', 'bg-[#0b0c10]/30', 'border-white/5');
                dynamicNav.classList.remove('max-w-5xl', 'rounded-full', 'bg-white/10', 'border-white/20');
                navContent.classList.add('h-20');
                navContent.classList.remove('h-16', 'px-8');
            }
        });
        function logout() {
            localStorage.removeItem('stonks_auth_token');
            window.location.replace('index.html');
        }
    </script>

    <script>
        const canvas = document.getElementById('stonks-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        const nodes = Array.from({length: 60}, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3 }));
        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.shadowBlur = 0; 
            nodes.forEach(n => {
                n.x += n.vx; n.y += n.vy;
                if(n.x < 0 || n.x > canvas.width) n.vx *= -1;
                if(n.y < 0 || n.y > canvas.height) n.vy *= -1;
                ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(167, 139, 250, 0.6)'; ctx.fillStyle = 'rgba(167, 139, 250, 0.8)';     
                ctx.beginPath(); ctx.arc(n.x, n.y, 1.5, 0, Math.PI * 2); ctx.fill();
                nodes.forEach(n2 => {
                    const dist = Math.hypot(n.x - n2.x, n.y - n2.y);
                    if(dist < 120) { 
                        ctx.beginPath(); ctx.shadowBlur = 0; ctx.strokeStyle = `rgba(167, 139, 250, ${(1 - dist/120) * 0.3})`;
                        ctx.lineWidth = 1; ctx.moveTo(n.x, n.y); ctx.lineTo(n2.x, n2.y); ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(drawBackground);
        }
        drawBackground();
    </script>

    <script src="app.js"></script>
</body>
</html>
